version: '3.8'

services:
  # ----------------------------------------------------
  # Frontend Web Container
  # ----------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: template_frontend
    restart: unless-stopped
    # Exposes port internally to Nginx
    expose:
      - "3000"
    networks:
      - template_network

  # ----------------------------------------------------
  # Backend API Container
  # ----------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: template_backend
    restart: unless-stopped
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=secret
    expose:
      - "8080"
    depends_on:
      - database
    networks:
      - template_network

  # ----------------------------------------------------
  # Database Container (e.g., PostgreSQL)
  # ----------------------------------------------------
  database:
    image: postgres:15-alpine
    container_name: template_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: template_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - template_network

  # ----------------------------------------------------
  # Nginx Reverse Proxy Container
  # ----------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: template_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - template_network

# ----------------------------------------------------
# Networks & Volumes
# ----------------------------------------------------
networks:
  template_network:
    driver: bridge

volumes:
  pgdata:
