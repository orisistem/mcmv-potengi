version: '3.8'

services:
  # ----------------------------------------------------
  # Prometheus (Metrics Scraper)
  # ----------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: template_prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - template_network

  # ----------------------------------------------------
  # Grafana (Metrics Visualization)
  # ----------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: template_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Change this in production
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - template_network

# ----------------------------------------------------
# Networks & Volumes
# ----------------------------------------------------
networks:
  template_network:
    external: true # Assumes you already ran `docker-compose up` on the main file

volumes:
  prometheus_data:
  grafana_data:
